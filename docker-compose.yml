services:
  # Self-hosted Telegram Bot API Server (local mode, up to 2 GB uploads)
  telegram-bot-api:
    build:
      context: ./telegram-bot-api
      dockerfile: Dockerfile
    container_name: telegram-bot-api
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
      - TELEGRAM_HTTP_PORT=8081
      # proxychains proxy config (routes through host SOCKS5 proxy to reach Telegram DC)
      - PROXY_HOST=host.docker.internal
      - PROXY_PORT=7890
      - PROXY_TYPE=socks5
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  douyin-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyin-downloader
    depends_on:
      - telegram-bot-api
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded files to host
      - ./downloads:/app/Downloaded
      # Mount config (restart container after changes)
      - ./app/config.yml:/app/config.yml:ro
    environment:
      - DY_CONFIG_PATH=config.yml
      # Immich config lives in config.yml; env vars below are fallbacks
      - IMMICH_API_URL=http://host.docker.internal:2283
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      # Telegram config lives in config.yml; env vars below are fallbacks
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Uncomment for transcript support
      # - OPENAI_API_KEY=sk-xxxx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  telegram-bot-api-data:
