services:
  # ── 自建 Telegram Bot API Server (local 模式，支持上传 2GB 文件) ──
  telegram-bot-api:
    build:
      context: ./telegram-bot-api
      dockerfile: Dockerfile
    container_name: telegram-bot-api
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
      - TELEGRAM_HTTP_PORT=8081
      # proxychains 代理配置 (通过宿主机代理访问 Telegram DC)
      - PROXY_HOST=host.docker.internal
      - PROXY_PORT=7890
      - PROXY_TYPE=socks5
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  douyin-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyin-downloader
    depends_on:
      - telegram-bot-api
    ports:
      - "8000:8000"
    volumes:
      # 下载文件持久化到宿主机
      - ./downloads:/app/Downloaded
      # 配置文件挂载（宿主机修改后重启容器生效）
      - ./app/config.yml:/app/config.yml:ro
    environment:
      - DY_CONFIG_PATH=config.yml
      # Immich 配置已移至 config.yml，以下环境变量作为备用/覆盖
      - IMMICH_API_URL=http://host.docker.internal:2283
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      # Telegram 配置已移至 config.yml，以下环境变量作为备用/覆盖
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # 如需 transcript 功能，取消下行注释
      # - OPENAI_API_KEY=sk-xxxx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  telegram-bot-api-data:
