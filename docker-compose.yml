services:
  douyin-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyin-downloader
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded files to host
      - ./downloads:/app/app/Downloaded
      # Mount config (restart container after changes)
      - ./config.yml:/app/app/config.yml:ro
    environment:
      - DY_CONFIG_PATH=config.yml
      # All config now lives in config.yml
      # Uncomment for transcript support
      # - OPENAI_API_KEY=sk-xxxx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
